services:
  cassandra-1:
    image: cassandra:5.0
    container_name: cassandra-1
    hostname: cassandra-1
    restart: on-failure
    ports:
      - "9042:9042"
    environment: &cassandra-env
      CASSANDRA_CLUSTER_NAME: "harbour-cluster"
      CASSANDRA_DC: "datacenter1"
      CASSANDRA_RACK: "rack1"
      CASSANDRA_ENDPOINT_SNITCH: "GossipingPropertyFileSnitch"
      CASSANDRA_SEEDS: "cassandra-1"
      MAX_HEAP_SIZE: "1G"
      HEAP_NEWSIZE: "256M"
      JVM_EXTRA_OPTS: "-Dcassandra.consistent.rangemovement=false"
    volumes:
      - cassandra-1-data:/var/lib/cassandra
    networks:
      - cassandra-net
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -E '^UN' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  cassandra-2:
    image: cassandra:5.0
    container_name: cassandra-2
    hostname: cassandra-2
    restart: on-failure
    ports:
      - "9043:9042"
    environment:
      <<: *cassandra-env
    volumes:
      - cassandra-2-data:/var/lib/cassandra
    networks:
      - cassandra-net
    depends_on:
      cassandra-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -E '^UN' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  cassandra-3:
    image: cassandra:5.0
    container_name: cassandra-3
    hostname: cassandra-3
    restart: on-failure
    ports:
      - "9044:9042"
    environment:
      <<: *cassandra-env
    volumes:
      - cassandra-3-data:/var/lib/cassandra
    networks:
      - cassandra-net
    depends_on:
      cassandra-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -E '^UN' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

networks:
  cassandra-net:
    driver: bridge

volumes:
  cassandra-1-data:
  cassandra-2-data:
  cassandra-3-data:
