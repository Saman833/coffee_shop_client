spring.application.name=coffee-shop-backend
server.port=8081

# Coordinator and shard datasources are configured manually below.
# Disable default DataSource auto-configuration since we wire multiple ones ourselves.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.JdbcTemplateAutoConfiguration
spring.flyway.enabled=false

# Coordinator DB (batch_request, batch_item)
coffeeshop.coordinator.url=jdbc:postgresql://localhost:5432/coffee_coordinator
coffeeshop.coordinator.username=coffee
coffeeshop.coordinator.password=coffee

# Sharded payments DBs - count must match the number of configured instances.
coffeeshop.sharding.count=2
coffeeshop.sharding.instances[0].url=jdbc:postgresql://localhost:5432/coffee_shard_0
coffeeshop.sharding.instances[0].username=coffee
coffeeshop.sharding.instances[0].password=coffee
coffeeshop.sharding.instances[1].url=jdbc:postgresql://localhost:5432/coffee_shard_1
coffeeshop.sharding.instances[1].username=coffee
coffeeshop.sharding.instances[1].password=coffee

# Remote payments system (the upstream service we propagate payments to)
coffeeshop.remote.base-url=http://localhost:8080

# Async worker
coffeeshop.worker.enabled=true
coffeeshop.worker.poll-delay-ms=1000
coffeeshop.worker.batch-size=25
coffeeshop.worker.max-attempts=5
coffeeshop.worker.lease-duration-ms=60000
